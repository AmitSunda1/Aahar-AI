<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aahar AI — Offline</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #0a0a0a;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }

      .icon {
        width: 80px;
        height: 80px;
        margin-bottom: 24px;
        opacity: 0.6;
      }

      .icon-ring {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 2px solid #0b5fff;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        position: relative;
      }

      .icon-slash {
        width: 40px;
        height: 2px;
        background-color: #0b5fff;
        transform: rotate(45deg);
        position: absolute;
      }

      .wifi-icon {
        width: 32px;
        height: 32px;
        opacity: 0.5;
      }

      h1 {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 12px;
        color: #ffffff;
      }

      p {
        font-size: 15px;
        line-height: 1.6;
        color: #9ca3af;
        max-width: 300px;
        margin-bottom: 32px;
      }

      .tip {
        font-size: 13px;
        color: #4b5563;
        max-width: 280px;
        line-height: 1.5;
      }

      .retry-btn {
        margin-top: 32px;
        padding: 14px 32px;
        background-color: #0b5fff;
        color: #ffffff;
        border: none;
        border-radius: 14px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }

      .retry-btn:active {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="icon-ring">
      <svg class="wifi-icon" viewBox="0 0 24 24" fill="none" stroke="#0b5fff" stroke-width="2" stroke-linecap="round">
        <path d="M1.5 8.5C5.2 4.8 10.3 3 12 3s6.8 1.8 10.5 5.5"/>
        <path d="M5 12c1.9-1.9 4.3-3 7-3s5.1 1.1 7 3"/>
        <path d="M8.5 15.5c.9-.9 2.2-1.5 3.5-1.5s2.6.6 3.5 1.5"/>
        <circle cx="12" cy="19" r="1" fill="#0b5fff"/>
      </svg>
      <div class="icon-slash"></div>
    </div>

    <h1>You're offline</h1>
    <p>
      Connect to the internet to sync your meals, progress, and AI suggestions.
    </p>
    <p class="tip">
      Your last dashboard data may still be available — open the app once you're back online.
    </p>

    <button class="retry-btn" onclick="window.location.reload()">
      Try again
    </button>
  </body>
</html>
